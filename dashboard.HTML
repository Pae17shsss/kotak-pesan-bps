<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kotak Penitipan Salam — BPS Kabupaten Bangka</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:  #fdf8f3;
      --pink:   #fce8e4;
      --rose:   #f2a99a;
      --navy:   #2b3a52;
      --slate:  #5a6a82;
      --mid:    #8a9bb5;
      --light:  #c8d5e8;
      --white:  #ffffff;
      --shadow: rgba(43,58,82,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ─── floating deco ─────────────────────────────────── */
    .deco {
      position: fixed;
      pointer-events: none;
      opacity: .18;
      font-size: 2rem;
      animation: floatDeco 6s ease-in-out infinite;
    }
    .deco:nth-child(1){ top: 7%;  left: 5%;  animation-delay: 0s;   }
    .deco:nth-child(2){ top: 12%; right: 7%; animation-delay: 1.5s; font-size:1.6rem; }
    .deco:nth-child(3){ bottom:15%; left:8%; animation-delay: 0.8s; font-size:1.4rem; }
    .deco:nth-child(4){ bottom:10%; right:6%;animation-delay: 2.3s; font-size:2.2rem; }
    @keyframes floatDeco {
      0%,100%{ transform: translateY(0) rotate(0deg); }
      50%    { transform: translateY(-12px) rotate(6deg); }
    }

    /* ─── card ──────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 40px 48px 36px;
      max-width: 620px;
      width: 92vw;
      box-shadow: 0 8px 40px var(--shadow);
      position: relative;
      z-index: 10;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── header ────────────────────────────────────────── */
    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--navy);
      letter-spacing: .5px;
      margin-bottom: 4px;
    }
    .card-header p {
      font-size: .78rem;
      color: var(--mid);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ─── NIP input row ─────────────────────────────────── */
    .nip-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    .nip-row .icon-sm { font-size: 1.1rem; color: var(--mid); }
    .nip-row input {
      border: 1.5px solid var(--light);
      border-radius: 30px;
      padding: 8px 20px;
      font-family: 'Lato', sans-serif;
      font-size: .9rem;
      color: var(--navy);
      background: var(--cream);
      outline: none;
      width: 220px;
      transition: border .2s;
    }
    .nip-row input:focus { border-color: var(--rose); }
    .nip-row input::placeholder { color: var(--mid); }

    /* ─── envelope area ─────────────────────────────────── */
    #envelope-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* ─── ENVELOPE ──────────────────────────────────────── */
    .envelope-wrap {
      cursor: default;
      position: relative;
      width: 160px;
      height: 110px;
      margin-bottom: 10px;
    }
    .envelope-wrap.can-open { cursor: pointer; }
    .envelope-wrap.can-open:hover .env-body { transform: translateY(-3px); }

    /* envelope body */
    .env-body {
      position: absolute;
      inset: 0;
      background: var(--light);
      border-radius: 6px;
      box-shadow: 0 4px 18px var(--shadow);
      transition: transform .2s;
      overflow: hidden;
    }

    /* flap — CLOSED */
    .env-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      background: var(--mid);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform .6s cubic-bezier(.4,0,.2,1), background .3s;
      z-index: 3;
    }
    .envelope-wrap.can-open .env-flap { background: var(--rose); }
    .envelope-wrap.opening .env-flap {
      transform: rotateX(-180deg);
      background: var(--rose);
    }

    /* left & right triangles */
    .env-left, .env-right, .env-bottom {
      position: absolute;
      bottom: 0; left: 0;
      width: 50%; height: 100%;
      background: var(--light);
      filter: brightness(.93);
      clip-path: polygon(0 0,0 100%,100% 100%);
      z-index: 2;
    }
    .env-right { left: auto; right: 0; clip-path: polygon(100% 0,0 100%,100% 100%); }
    .env-bottom { width: 100%; clip-path: polygon(0 100%,100% 100%,50% 45%); filter: brightness(.88); }

    /* letter peeking out */
    .env-letter {
      position: absolute;
      left: 20px; right: 20px;
      bottom: 14px;
      background: var(--white);
      border-radius: 4px;
      height: 60px;
      z-index: 1;
      transform: translateY(0);
      opacity: 0;
      transition: transform .5s .3s ease, opacity .4s .3s;
    }
    .envelope-wrap.opening .env-letter {
      transform: translateY(-42px);
      opacity: 1;
    }

    /* hint text */
    .env-hint {
      font-size: .72rem;
      color: var(--mid);
      letter-spacing: .6px;
      margin-top: 6px;
      min-height: 18px;
      transition: opacity .3s;
    }

    /* ─── LETTER PANEL ──────────────────────────────────── */
    #letter-panel {
      display: none;
      flex-direction: column;
      width: 100%;
      animation: slideUp .5s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .recipient-label {
      text-align: center;
      font-size: .75rem;
      color: var(--mid);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .recipient-name {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--navy);
      margin-bottom: 18px;
    }

    /* letter card */
    .letter-card {
      background: var(--pink);
      border-radius: 14px;
      padding: 22px 24px 18px;
      min-height: 130px;
      position: relative;
      margin-bottom: 14px;
      animation: fadeMsg .4s ease;
    }
    @keyframes fadeMsg {
      from { opacity:0; transform:scale(.97); }
      to   { opacity:1; transform:scale(1); }
    }
    .letter-card .msg {
      font-size: .92rem;
      line-height: 1.7;
      color: var(--navy);
      white-space: pre-wrap;
    }
    .letter-card .sender {
      margin-top: 14px;
      font-size: .75rem;
      color: var(--slate);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .letter-card .sender::before { content: '✈'; font-size: .8rem; }

    /* counter & nav */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .counter {
      font-size: .8rem;
      color: var(--mid);
      letter-spacing: .5px;
    }
    .btn {
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 30px;
      padding: 8px 22px;
      font-family: 'Lato', sans-serif;
      font-size: .82rem;
      cursor: pointer;
      letter-spacing: .5px;
      transition: background .2s, transform .1s;
    }
    .btn:hover { background: var(--slate); }
    .btn:active { transform: scale(.97); }
    .btn.ghost {
      background: transparent;
      color: var(--slate);
      border: 1.5px solid var(--light);
    }
    .btn.ghost:hover { background: var(--cream); }

    /* ─── footer ────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 12px 28px;
      font-size: .72rem;
      color: var(--mid);
      letter-spacing: .6px;
    }

    /* ─── no-message state ──────────────────────────────── */
    .no-msg {
      text-align: center;
      padding: 20px 0 10px;
      color: var(--mid);
      font-size: .88rem;
    }

    /* ─── dots ──────────────────────────────────────────── */
    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 6px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--light);
      transition: background .3s;
    }
    .dot.active { background: var(--navy); }
  </style>
</head>

</div><!-- /card -->

// ─── STATE ──────────────────────────────────────────────
let messages = [];
let currentIdx = 0;
let opened = false;

// ─── DOM REFS ────────────────────────────────────────────
const nipInput      = document.getElementById('nipInput');
const envWrap       = document.getElementById('envelope-wrap');
const envHint       = document.getElementById('envHint');
const letterPanel   = document.getElementById('letter-panel');
const recipientName = document.getElementById('recipientName');
const msgText       = document.getElementById('msgText');
const msgSender     = document.getElementById('msgSender');
const counter       = document.getElementById('counter');
const dotsEl        = document.getElementById('dots');

// ─── NIP INPUT ───────────────────────────────────────────
nipInput.addEventListener('input', () => {
  const nip = nipInput.value.trim().toLowerCase();
  const found = DATA.filter(d => String(d.NIP).toLowerCase() === nip);
  if (found.length > 0) {
    envWrap.classList.add('can-open');
    envHint.textContent = `✨ Ada ${found.length} surat untukmu! Klik amplop untuk membuka.`;
    if (opened) resetToEnvelope();
  } else {
    envWrap.classList.remove('can-open');
    envHint.textContent = nip ? 'NIP tidak ditemukan 😔' : 'Masukkan NIP untuk membuka surat ✨';
    if (opened) resetToEnvelope();
  }
  opened = false;
  messages = found;
  currentIdx = 0;
});

function resetToEnvelope() {
  letterPanel.style.display = 'none';
  envWrap.style.display = 'flex';
  envHint.style.opacity = '1';
  envWrap.classList.remove('opening');
  opened = false;
}

// ─── OPEN ENVELOPE ───────────────────────────────────────
function tryOpen() {
  if (!envWrap.classList.contains('can-open')) return;
  if (opened) return;
  opened = true;

  envWrap.classList.add('opening');

  setTimeout(() => {
    envWrap.style.display = 'none';
    envHint.style.opacity = '0';
    letterPanel.style.display = 'flex';
    renderMessage();
  }, 900);
}

// ─── RENDER MESSAGE ──────────────────────────────────────
function renderMessage() {
  if (!messages.length) return;
  const m = messages[currentIdx];

  recipientName.textContent = m.Penerima;
  msgText.textContent = m['Tuliskan Apresiasimu'];
  msgSender.textContent = m.Pengirim === '-' ? 'Anonim' : m.Pengirim;
  counter.textContent = `${currentIdx + 1} / ${messages.length}`;

  // dots
  dotsEl.innerHTML = '';
  const maxDots = Math.min(messages.length, 8);
  for (let i = 0; i < maxDots; i++) {
    const d = document.createElement('span');
    d.className = 'dot' + (i === currentIdx % maxDots ? ' active' : '');
    dotsEl.appendChild(d);
  }

  // re-trigger animation
  const lc = document.querySelector('.letter-card');
  lc.style.animation = 'none';
  void lc.offsetWidth;
  lc.style.animation = 'fadeMsg .4s ease';
}

function nextMsg() {
  if (!messages.length) return;
  currentIdx = (currentIdx + 1) % messages.length;
  renderMessage();
}

function prevMsg() {
  if (!messages.length) return;
  currentIdx = (currentIdx - 1 + messages.length) % messages.length;
  renderMessage();
}
</script>
